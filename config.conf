# config.conf - Configuração do WebAudit
#
# Este arquivo é carregado (via `source`) antes do parsing da linha de comando.
# Portanto, qualquer flag equivalente passada na CLI tem PRECEDÊNCIA sobre o
# que estiver aqui. Copie para o diretório do webaudit.sh ou aponte com -c.
#
# Sintaxe: variáveis Bash. Não use espaços ao redor do "=".

# Timeout por operação (segundos).
WEBAUDIT_TIMEOUT=10

# User-Agent das requisições HTTP.
WEBAUDIT_USER_AGENT="WebAudit/1.0.0"

# Proxy para curl (ex.: http://127.0.0.1:8080). Vazio = sem proxy.
WEBAUDIT_PROXY=""

# Cache local: 1 habilita, 0 desabilita.
WEBAUDIT_CACHE_ENABLED=1

# Diretório de cache (padrão: ./cache).
# WEBAUDIT_CACHE_DIR="/var/cache/webaudit"

# Consulta de CVEs: 1 habilita, 0 desabilita.
WEBAUDIT_CVE_ENABLED=1

# API keys opcionais (elevam limites de rate).
# NVD (NIST): https://nvd.nist.gov/developers/request-an-api-key
WEBAUDIT_NVD_API_KEY=""
# GitHub (para GitHub Security Advisories).
WEBAUDIT_GITHUB_TOKEN=""

# Formato de saída padrão: text | json | csv | html | markdown | yaml
WEBAUDIT_OUTPUT="text"
